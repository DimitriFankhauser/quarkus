quarkus.http.ssl.certificate.key-store-file=null

quarkus.log.file.enabled=true
quarkus.log.file.path=target/quarkus.log
quarkus.log.file.format=%C - %s%n

# HSM configuration – all properties that were previously hard-coded in Java or embedded
# in pkcs11.cfg can be supplied here and are injected into RsaUtil via @ConfigProperty.
hsm.user-pin=2133
hsm.key-alias=rsaGenesis

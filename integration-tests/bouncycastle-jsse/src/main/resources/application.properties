quarkus.http.ssl.certificate.key-store-file=null


#quarkus.http.ssl.certificate.key-store-provider=SunPKCS11

quarkus.security.security-providers=SunPKCS11
quarkus.security.security-provider-config.SunPKCS11=pkcs11.cfg
quarkus.http.ssl.certificate.key-store-provider=SunPKCS11

# KEYSTORE
quarkus.http.ssl.certificate.key-store-alias=rsaGenesis
quarkus.http.ssl.certificate.key-store-password=123456789

# TRUSTSTORE
quarkus.http.ssl.certificate.trust-store-alias=rsaGenesis

quarkus.http.ssl.certificate.trust-store-password=123456789

quarkus.http.insecure-requests=disabled

quarkus.native.additional-build-args=-H:IncludeResources=.*\\.jks

# Correct options to run t

#quarkus.http.ssl.certificate.key-store-file=server-keystore.jks
#quarkus.http.ssl.certificate.key-store-password-key=keystore-password
#quarkus.http.ssl.certificate.key-store-password=secret
#quarkus.http.ssl.certificate.trust-store-file=server-truststore.jks
#quarkus.http.ssl.certificate.trust-store-password-key=truststore-password
#quarkus.http.ssl.certificate.trust-store-password=password
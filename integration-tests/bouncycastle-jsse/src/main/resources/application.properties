quarkus.http.ssl.certificate.key-store-file=null


quarkus.security.security-providers=SunPKCS11
quarkus.security.security-provider-config.SunPKCS11=pkcs11.cfg
quarkus.http.ssl.certificate.key-store-provider=SunPKCS11

# KEYSTORE
quarkus.http.ssl.certificate.key-store-alias=rsaGenesis
quarkus.http.ssl.certificate.key-store-password=123456789



# TRUSTSTORE DOESN'T NEED TO BE PULLED FROM HSM
quarkus.http.ssl.certificate.files=dimitri-certificate.pem
quarkus.http.ssl.certificate.key-files=dimitri-key.pem
quarkus.http.insecure-requests=disabled

quarkus.native.additional-build-args=-H:IncludeResources=.*\\.jks

